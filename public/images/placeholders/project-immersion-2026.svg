<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0d1824"/>
    </linearGradient>
    <linearGradient id="sharkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2eb8b8"/>
      <stop offset="100%" stop-color="#1a7a8a"/>
    </linearGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44dddd" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#44dddd" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#skyGrad)"/>

  <!-- Subtle AR grid -->
  <g opacity="0.06" stroke="#44dddd" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="380" width="800" height="120" fill="#0f1e2e" opacity="0.5"/>
  <polygon points="300,380 500,380 620,500 180,500" fill="#141f2e" opacity="0.7"/>

  <!-- Glow under shark -->
  <ellipse cx="400" cy="395" rx="130" ry="28" fill="#2eb8b8" opacity="0.12" filter="url(#blur)"/>

  <!-- AR rings -->
  <ellipse cx="400" cy="390" rx="110" ry="22" fill="none" stroke="#44dddd" stroke-width="2" opacity="0.5"/>
  <ellipse cx="400" cy="390" rx="145" ry="30" fill="none" stroke="#44dddd" stroke-width="1" opacity="0.2"/>

  <!-- Shark -->
  <g transform="translate(400, 245)">
    <polygon points="-15,115 -48,158 5,138 48,158 15,115" fill="url(#sharkGrad)" opacity="0.9"/>
    <ellipse cx="0" cy="58" rx="38" ry="88" fill="url(#sharkGrad)"/>
    <ellipse cx="9" cy="63" rx="18" ry="62" fill="#d8f0f0" opacity="0.22"/>
    <polygon points="0,-32 -13,28 13,28" fill="#1a9090"/>
    <polygon points="-38,48 -85,92 -20,68" fill="#1a9090" opacity="0.9"/>
    <polygon points="38,48 85,92 20,68" fill="#1a9090" opacity="0.9"/>
    <ellipse cx="0" cy="-26" rx="28" ry="33" fill="url(#sharkGrad)"/>
    <circle cx="-11" cy="-29" r="5" fill="#0a1520"/>
    <circle cx="-11" cy="-29" r="2.5" fill="#fff" opacity="0.8"/>
    <path d="M -18 -10 Q 0 -2 18 -10" fill="none" stroke="#0a3040" stroke-width="2" opacity="0.5"/>
    <path d="M -26 10 Q -30 20 -26 30" fill="none" stroke="#0a3040" stroke-width="1.5" opacity="0.45"/>
    <path d="M -22 8 Q -26 18 -22 28" fill="none" stroke="#0a3040" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Left phone -->
  <g transform="translate(62, 55)">
    <rect x="0" y="0" width="142" height="268" rx="18" fill="#0d1824" stroke="#2a3a4a" stroke-width="2"/>
    <rect x="6" y="6" width="130" height="256" rx="14" fill="#1a3040"/>
    <!-- Checkpoints card -->
    <rect x="66" y="16" width="62" height="56" rx="6" fill="#0d1e2e" opacity="0.95"/>
    <text x="97" y="29" font-family="sans-serif" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Checkpoints</text>
    <circle cx="74" cy="40" r="4" fill="none" stroke="#44dddd" stroke-width="1.5"/>
    <text x="82" y="43" font-family="sans-serif" font-size="6" fill="#44dddd">San Pedro Sq</text>
    <circle cx="74" cy="54" r="4" fill="none" stroke="#666" stroke-width="1.5"/>
    <text x="82" y="57" font-family="sans-serif" font-size="6" fill="#888">Sharks Way</text>
    <!-- Mini shark -->
    <ellipse cx="48" cy="140" rx="19" ry="44" fill="#2eb8b8" opacity="0.75"/>
    <polygon points="48,96 38,108 58,108" fill="#1a9090" opacity="0.9"/>
    <!-- Welcome card -->
    <rect x="10" y="192" width="120" height="56" rx="6" fill="#0f2030" opacity="0.93"/>
    <text x="70" y="207" font-family="sans-serif" font-size="7.5" fill="#fff" text-anchor="middle" font-weight="bold">Welcome to Sharks Way</text>
    <text x="70" y="221" font-family="sans-serif" font-size="5.5" fill="#aaa" text-anchor="middle">Point your phone at a</text>
    <text x="70" y="230" font-family="sans-serif" font-size="5.5" fill="#aaa" text-anchor="middle">Sharks Way mural to bring</text>
    <text x="70" y="239" font-family="sans-serif" font-size="5.5" fill="#aaa" text-anchor="middle">the street to life.</text>
    <rect x="51" y="256" width="40" height="3" rx="2" fill="#334"/>
  </g>

  <!-- Right phone -->
  <g transform="translate(596, 75)">
    <rect x="0" y="0" width="132" height="248" rx="18" fill="#0d1824" stroke="#2a3a4a" stroke-width="2"/>
    <rect x="6" y="6" width="120" height="236" rx="14" fill="#1e3a20"/>
    <!-- Header -->
    <rect x="6" y="6" width="120" height="24" rx="0" fill="#0a1810"/>
    <text x="42" y="20" font-family="sans-serif" font-size="7" fill="#fff" font-weight="bold">Soccer AR Prototype</text>
    <text x="100" y="15" font-family="sans-serif" font-size="6.5" fill="#fff" text-anchor="middle">00:29</text>
    <text x="90" y="26" font-family="sans-serif" font-size="5" fill="#ccc" text-anchor="middle">Pts 0 · Goals 0/0 · Streak 0</text>
    <!-- Goal -->
    <rect x="24" y="80" width="84" height="52" rx="2" fill="none" stroke="#44aaff" stroke-width="1.5" opacity="0.85"/>
    <line x1="24" y1="97" x2="108" y2="97" stroke="#44aaff" stroke-width="0.5" opacity="0.4"/>
    <line x1="24" y1="114" x2="108" y2="114" stroke="#44aaff" stroke-width="0.5" opacity="0.4"/>
    <line x1="52" y1="80" x2="52" y2="132" stroke="#44aaff" stroke-width="0.5" opacity="0.4"/>
    <line x1="80" y1="80" x2="80" y2="132" stroke="#44aaff" stroke-width="0.5" opacity="0.4"/>
    <!-- Mascot -->
    <circle cx="66" cy="96" r="11" fill="#1a6060" opacity="0.85"/>
    <circle cx="66" cy="88" r="6" fill="#2eb8b8" opacity="0.7"/>
    <!-- Swipe button -->
    <rect x="18" y="142" width="96" height="19" rx="9" fill="#2eb8b8" opacity="0.9"/>
    <text x="66" y="155" font-family="sans-serif" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">GO! Swipe up to shoot</text>
    <!-- Ball -->
    <circle cx="66" cy="183" r="12" fill="#111" stroke="#444" stroke-width="1"/>
    <path d="M66,171 L58,178 L61,188 L71,188 L74,178 Z" fill="#2a2a2a" opacity="0.7"/>
    <!-- Reset button -->
    <rect x="88" y="220" width="32" height="14" rx="4" fill="#1a3a2a"/>
    <text x="104" y="230" font-family="sans-serif" font-size="6.5" fill="#ccc" text-anchor="middle">Reset</text>
  </g>

  <!-- AR scan corners -->
  <g stroke="#44dddd" stroke-width="2" fill="none" opacity="0.55">
    <path d="M 185 115 L 185 138 M 185 115 L 208 115"/>
    <path d="M 615 115 L 615 138 M 615 115 L 592 115"/>
    <path d="M 185 382 L 185 359 M 185 382 L 208 382"/>
    <path d="M 615 382 L 615 359 M 615 382 L 592 382"/>
  </g>

  <!-- Top badge -->
  <rect x="268" y="22" width="264" height="38" rx="19" fill="#0d1824" stroke="#2eb8b8" stroke-width="1.5" opacity="0.96"/>
  <rect x="278" y="30" width="22" height="22" rx="4" fill="#2eb8b8" opacity="0.9"/>
  <text x="289" y="45" font-family="sans-serif" font-size="8.5" fill="#0d1824" text-anchor="middle" font-weight="bold">8W</text>
  <text x="400" y="46" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">Immersion 2026 Showcase</text>

  <!-- Bottom bar -->
  <rect x="0" y="452" width="800" height="48" fill="#0a1218" opacity="0.85"/>
  <text x="400" y="472" font-family="sans-serif" font-size="10.5" fill="#44dddd" text-anchor="middle" letter-spacing="2.5" opacity="0.9">MOBILE WEB AR  ·  SJSU HOMETOWN HEROES  ·  50 ATTENDEES</text>
  <text x="400" y="490" font-family="sans-serif" font-size="9.5" fill="#fff" text-anchor="middle" opacity="0.45">Featured in SJSU Spring 2026 Magazine</text>
</svg>
